<!DOCTYPE html>
<html>
	<body>
		<h2> Copies for name [[${name}]] </h2>
		<ul>
		    <li th:each="res, iter : ${result}" class="table-row">
		        [[${res}]]
		    </li>
		</ul>
		<a href="/">Back</a>
		<script>
		    document.querySelectorAll('.table-row').forEach(item => {
		        const randomHue = Math.floor(Math.random() * 360);
		        item.style.color = `hsl(${randomHue}, 70%, 50%)`;
		    });
		</script>
	</body>
</html>
